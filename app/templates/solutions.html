{% extends "base.html" %}
{% block title %}솔루션 - Card Auto{% endblock %}
{% block page_title %}<i class="fa-solid fa-puzzle-piece mr-2 text-blue-600"></i>솔루션{% endblock %}

{% block content %}
<div class="max-w-2xl">
  <script type="application/json" id="lookup-items-json">{{ lookup_reorder_items_json | safe }}</script>

  <div class="flex flex-wrap items-center justify-between gap-2 mb-3">
    <span class="text-sm text-gray-600">총 <strong id="lookup-count">{{ solutions|length }}</strong>개</span>
    <div class="flex flex-wrap items-center gap-2">
      <button id="btn-lookup-add" type="button" class="btn-primary text-xs inline-flex items-center gap-1">
        <i class="fa-solid fa-plus" aria-hidden="true"></i><span>추가</span>
      </button>
      <button id="btn-reorder-enter" type="button" class="btn-secondary text-xs inline-flex items-center gap-1">
        <i class="fa-solid fa-arrows-up-down" aria-hidden="true"></i><span>순서 편집</span>
      </button>
      <div id="reorder-toolbar" class="hidden flex flex-wrap items-center gap-2">
        <button id="btn-reorder-save" type="button" class="btn-primary text-xs inline-flex items-center gap-1">
          <i class="fa-solid fa-check" aria-hidden="true"></i><span>저장</span>
        </button>
        <button id="btn-reorder-cancel" type="button" class="btn-secondary text-xs inline-flex items-center gap-1">
          <i class="fa-solid fa-xmark" aria-hidden="true"></i><span>취소</span>
        </button>
      </div>
    </div>
  </div>

  <div id="lookup-table-wrap" class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
    <table class="w-full text-sm">
      <thead id="lookup-thead" class="bg-gray-50 border-b border-gray-200"></thead>
      <tbody id="lookup-tbody"></tbody>
    </table>
  </div>
</div>

<div id="item-modal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex items-center justify-center">
  <div class="bg-white rounded-xl shadow-xl p-6 w-full max-w-sm">
    <h3 id="modal-title" class="text-base font-semibold text-gray-800 mb-4">솔루션 등록</h3>
    <input type="hidden" id="edit-id" />
    <div class="space-y-3">
      <div>
        <label class="block text-xs text-gray-600 mb-1">솔루션명 <span class="text-red-500">*</span></label>
        <input id="f-name" type="text" class="input-field" placeholder="솔루션명을 입력하세요" />
      </div>
      <label class="flex items-center gap-2 cursor-pointer">
        <input id="f-active" type="checkbox" checked class="rounded" />
        <span class="text-xs text-gray-700">활성 상태</span>
      </label>
    </div>
    <div class="flex gap-3 mt-4">
      <button id="submit-item-btn" type="button" class="btn-primary flex-1">저장</button>
      <button id="close-modal-btn" type="button" class="btn-secondary flex-1">취소</button>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/lookup_reorder.js"></script>
<script>
  const API = '/api/lookups/solutions';

  const modal = document.getElementById('item-modal');
  const modalTitle = document.getElementById('modal-title');
  const editIdInput = document.getElementById('edit-id');
  const nameInput = document.getElementById('f-name');
  const activeInput = document.getElementById('f-active');
  const submitItemBtn = document.getElementById('submit-item-btn');
  const closeModalBtn = document.getElementById('close-modal-btn');

  function openModal() {
    modalTitle.textContent = '솔루션 등록';
    editIdInput.value = '';
    nameInput.value = '';
    activeInput.checked = true;
    modal.classList.remove('hidden');
    nameInput.focus();
  }

  function editItem(row) {
    modalTitle.textContent = '솔루션 수정';
    editIdInput.value = String(row.id);
    nameInput.value = row.name;
    activeInput.checked = !!row.active_yn;
    modal.classList.remove('hidden');
    nameInput.focus();
  }

  function closeModal() {
    modal.classList.add('hidden');
  }

  async function submitItem() {
    const id = editIdInput.value;
    const body = {
      name: nameInput.value.trim(),
      active_yn: activeInput.checked,
    };
    if (!body.name) {
      showToast('솔루션명을 입력하세요', 'warning');
      return;
    }
    const url = id ? `${API}/${id}` : API;
    const method = id ? 'PUT' : 'POST';
    submitItemBtn.disabled = true;
    try {
      const res = await fetch(url, {
        method,
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (res.ok) {
        showToast('저장 완료', 'success');
        setTimeout(() => location.reload(), 600);
        return;
      }
      const e = await res.json();
      showToast(e.detail || '오류', 'error');
    } finally {
      submitItemBtn.disabled = false;
    }
  }

  async function deleteItem(id) {
    if (!confirm('삭제하시겠습니까?')) return;
    const res = await fetch(`${API}/${id}`, { method: 'DELETE' });
    if (res.ok) {
      showToast('삭제 완료', 'success');
      setTimeout(() => location.reload(), 600);
    }
  }

  document.getElementById('btn-lookup-add').addEventListener('click', openModal);
  closeModalBtn.addEventListener('click', closeModal);
  submitItemBtn.addEventListener('click', submitItem);

  LookupReorder.init({
    itemsScriptId: 'lookup-items-json',
    tbodyId: 'lookup-tbody',
    theadId: 'lookup-thead',
    tableWrapId: 'lookup-table-wrap',
    apiReorder: '/api/lookups/solutions/reorder',
    idType: 'number',
    nameColumnTitle: '솔루션명',
    emptyLabel: '솔루션',
    onEdit: editItem,
    onDelete: deleteItem,
  });
</script>
{% endblock %}
