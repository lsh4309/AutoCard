{% extends "base.html" %}
{% block title %}프로젝트 - Card Auto{% endblock %}
{% block page_title %}<i class="fa-solid fa-folder mr-2 text-blue-600"></i>프로젝트{% endblock %}

{% block head %}
<style>
  .project-table th,
  .project-table td {
    vertical-align: middle;
  }
  .project-table .project-name-cell {
    white-space: normal !important;
    word-break: keep-all;
    overflow-wrap: anywhere;
    line-height: 1.45;
  }
  .project-table .col-active,
  .project-table .col-actions {
    white-space: nowrap !important;
  }
</style>
{% endblock %}

{% block content %}
<div class="w-full max-w-6xl">
  <script type="application/json" id="lookup-items-json">{{ lookup_reorder_items_json | safe }}</script>

  <div class="flex flex-wrap items-center justify-between gap-2 mb-3">
    <span class="text-sm text-gray-600">총 <strong id="lookup-count">{{ projects|length }}</strong>개</span>
    <div class="flex flex-wrap items-center gap-2">
      <button id="btn-lookup-add" type="button" class="btn-primary text-xs inline-flex items-center gap-1">
        <i class="fa-solid fa-plus" aria-hidden="true"></i><span>추가</span>
      </button>
      <button id="btn-reorder-enter" type="button" class="btn-secondary text-xs inline-flex items-center gap-1">
        <i class="fa-solid fa-arrows-up-down" aria-hidden="true"></i><span>순서 편집</span>
      </button>
      <div id="reorder-toolbar" class="hidden flex flex-wrap items-center gap-2">
        <button id="btn-reorder-save" type="button" class="btn-primary text-xs inline-flex items-center gap-1">
          <i class="fa-solid fa-check" aria-hidden="true"></i><span>저장</span>
        </button>
        <button id="btn-reorder-cancel" type="button" class="btn-secondary text-xs inline-flex items-center gap-1">
          <i class="fa-solid fa-xmark" aria-hidden="true"></i><span>취소</span>
        </button>
      </div>
    </div>
  </div>

  <div id="lookup-table-wrap" class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
    <div class="overflow-x-auto">
      <table class="project-table w-full min-w-[640px] text-sm">
        <thead id="lookup-thead" class="bg-gray-50 border-b border-gray-200"></thead>
        <tbody id="lookup-tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<div id="item-modal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden items-center justify-center">
  <div class="bg-white rounded-xl shadow-xl p-6 w-full max-w-sm">
    <h3 id="modal-title" class="text-base font-semibold text-gray-800 mb-4">프로젝트 등록</h3>
    <input type="hidden" id="edit-id" />
    <div class="space-y-3">
      <div>
        <label class="block text-xs text-gray-600 mb-1">
          프로젝트명 <span class="text-red-500">*</span>
        </label>
        <input id="f-name" type="text" class="input-field" placeholder="프로젝트명을 입력하세요" />
      </div>
      <label class="flex items-center gap-2 cursor-pointer">
        <input id="f-active" type="checkbox" checked class="rounded" />
        <span class="text-xs text-gray-700">활성 상태</span>
      </label>
    </div>
    <div class="flex gap-3 mt-4">
      <button id="submit-item-btn" type="button" class="btn-primary flex-1">저장</button>
      <button id="close-modal-btn" type="button" class="btn-secondary flex-1">취소</button>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/lookup_reorder.js"></script>
<script>
  const API = '/api/lookups/projects';

  const modal = document.getElementById('item-modal');
  const modalTitle = document.getElementById('modal-title');
  const editIdInput = document.getElementById('edit-id');
  const nameInput = document.getElementById('f-name');
  const activeInput = document.getElementById('f-active');
  const submitItemBtn = document.getElementById('submit-item-btn');
  const closeModalBtn = document.getElementById('close-modal-btn');

  function setModalVisible(visible) {
    if (visible) {
      modal.classList.remove('hidden');
      modal.classList.add('flex');
      document.body.classList.add('overflow-hidden');
    } else {
      modal.classList.add('hidden');
      modal.classList.remove('flex');
      document.body.classList.remove('overflow-hidden');
    }
  }

  function resetForm() {
    editIdInput.value = '';
    nameInput.value = '';
    activeInput.checked = true;
  }

  function openModal() {
    modalTitle.textContent = '프로젝트 등록';
    resetForm();
    setModalVisible(true);
    nameInput.focus();
  }

  function editItem(row) {
    modalTitle.textContent = '프로젝트 수정';
    editIdInput.value = row.id;
    nameInput.value = row.name;
    activeInput.checked = !!row.active_yn;
    setModalVisible(true);
    nameInput.focus();
  }

  function closeModal() {
    setModalVisible(false);
  }

  async function submitItem() {
    const id = editIdInput.value.trim();
    const body = {
      name: nameInput.value.trim(),
      active_yn: activeInput.checked,
    };
    if (!body.name) {
      showToast('프로젝트명을 입력하세요', 'warning');
      nameInput.focus();
      return;
    }
    const url = id ? `${API}/${encodeURIComponent(id)}` : API;
    const method = id ? 'PUT' : 'POST';
    try {
      submitItemBtn.disabled = true;
      const res = await fetch(url, {
        method,
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (res.ok) {
        showToast('저장 완료', 'success');
        setTimeout(() => location.reload(), 500);
        return;
      }
      let errorMessage = '오류가 발생했습니다.';
      try {
        const e = await res.json();
        errorMessage = e.detail || errorMessage;
      } catch (_) {}
      showToast(errorMessage, 'error');
    } catch (error) {
      showToast('네트워크 오류가 발생했습니다.', 'error');
    } finally {
      submitItemBtn.disabled = false;
    }
  }

  async function deleteItem(id) {
    if (!confirm('삭제하시겠습니까?')) return;
    try {
      const res = await fetch(`${API}/${encodeURIComponent(id)}`, { method: 'DELETE' });
      if (res.ok) {
        showToast('삭제 완료', 'success');
        setTimeout(() => location.reload(), 500);
        return;
      }
      let errorMessage = '삭제 중 오류가 발생했습니다.';
      try {
        const e = await res.json();
        errorMessage = e.detail || errorMessage;
      } catch (_) {}
      showToast(errorMessage, 'error');
    } catch (error) {
      showToast('네트워크 오류가 발생했습니다.', 'error');
    }
  }

  document.getElementById('btn-lookup-add').addEventListener('click', openModal);
  closeModalBtn.addEventListener('click', closeModal);
  submitItemBtn.addEventListener('click', submitItem);
  modal.addEventListener('click', (e) => {
    if (e.target === modal) closeModal();
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && !modal.classList.contains('hidden')) closeModal();
  });

  LookupReorder.init({
    itemsScriptId: 'lookup-items-json',
    tbodyId: 'lookup-tbody',
    theadId: 'lookup-thead',
    tableWrapId: 'lookup-table-wrap',
    apiReorder: '/api/lookups/projects/reorder',
    idType: 'string',
    nameColumnTitle: '프로젝트명',
    emptyLabel: '프로젝트',
    nameCellClass: 'project-name-cell',
    onEdit: editItem,
    onDelete: deleteItem,
  });
</script>
{% endblock %}
